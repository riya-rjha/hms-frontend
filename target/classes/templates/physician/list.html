<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8"><title>HMS — Physician</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#0a1628,#1565c0);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
.badge-pos{font-size:11px;padding:3px 10px;border-radius:20px;display:inline-block}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
.search-active{border:2px solid #3b82f6 !important;background:#eff6ff !important}
</style>
</head>
<body>

<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1 active" href="/physician/list">Physician</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/patient/list">Patient</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/department/list">Department</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/nurse/list">Nurse</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/appointment/list">Appointment</a>
    <a class="btn btn-outline-light btn-sm" href="/procedure/list">Procedure</a>
  </div>
</nav>

<div class="page-header">
  <small class="opacity-50">Home / Physician</small>
  <h4 class="mb-0 mt-1">Physician Module</h4>
</div>

<div class="container-fluid px-4 py-3">

  <div th:if="${error}" class="alert alert-danger" th:text="'Backend Error: ' + ${error}"></div>

  <div class="card p-3">
    <table class="table table-sm table-hover">
      <thead class="table-light">
        <tr>
          <th>Employee ID</th>
          <th>Name</th>
          <th>Position</th>
          <th>SSN</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>
        <tr th:each="p : ${items}">

          <td th:text="${p['employeeId']}"></td>

          <td>
            <a th:href="@{/physician/relations(id=${p['employeeId']})}"
               th:text="${p['name']}"></a>
          </td>

          <td>
            <span
              th:style="${p['position'] == 'Staff Internist'} ? 'color:blue' :
                        (${p['position'] == 'Surgical Attending Physician'} ? 'color:orange' :
                        (${p['position'] == 'Head Chief of Medicine'} ? 'color:purple' :
                        'color:green'))"
              th:text="${p['position']}">
            </span>
          </td>

          <td th:text="${p['ssn']}"></td>

          <td>
            <!-- ✅ FIXED BUTTON -->
            <button class="btn btn-sm btn-warning me-1"
              th:attr="data-id=${p['employeeId']},
                       data-name=${p['name']},
                       data-position=${p['position']},
                       data-ssn=${p['ssn']}"
              onclick="handleEdit(this)">
              ✏️ Edit
            </button>

            <a th:href="@{/physician/relations(id=${p['employeeId']})}"
               class="btn btn-sm btn-outline-info">
              Details
            </a>
          </td>

        </tr>

        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="5" class="text-center text-muted py-3">No physicians found</td>
        </tr>

      </tbody>
    </table>
  </div>

</div>

<footer>HMS — Physician Module | Backend: localhost:8082</footer>

<script>
// ✅ SAFE HANDLER (replaces th:onclick logic)
function handleEdit(btn) {
  const id = btn.getAttribute("data-id");
  const name = btn.getAttribute("data-name");
  const position = btn.getAttribute("data-position");
  const ssn = btn.getAttribute("data-ssn");

  fillEditForm(id, name, position, ssn);
}

// existing function (unchanged)
function fillEditForm(id, name, position, ssn) {
  document.getElementById('f-id').value = id;
  document.getElementById('f-id').readOnly = true;
  document.getElementById('f-name').value = name;
  document.getElementById('f-pos').value = position;
  document.getElementById('f-ssn').value = ssn;
}
</script>

</body>
</html>
