<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Department Relations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#451a03,#78350f);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
.section-title{font-size:14px;font-weight:600;color:#475569;text-transform:uppercase}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1 active" href="/department/list">Department</a>
  </div>
</nav>

<div class="page-header">
  <small class="opacity-50">Home / Department / Relations</small>
  <h4 class="mb-0 mt-1">Department Relations</h4>
</div>

<div class="container-fluid px-4 py-4">

  <!-- SELECT -->
  <div class="card p-3 mb-3">
    <form method="get">
      <label class="form-label">Select Department</label>

      <select name="id" class="form-select w-auto" onchange="this.form.submit()">
        <option th:each="d : ${allItems}"
                th:value="${d['departmentId']}"
                th:text="${d['departmentId']} + ' — ' + ${d['name']}"
                th:selected="${d['departmentId']} == ${selectedId}">
        </option>
      </select>
    </form>
  </div>

  <!-- DETAILS -->
  <div class="card p-3 mb-3" th:if="${selectedItem != null}">
    <h5 th:text="${selectedItem['name']}"></h5>

    <div class="mt-2">
      <b>Department ID:</b>
      <span th:text="${selectedItem['departmentId']}"></span><br>

      <b>Head:</b>
      <span th:text="${selectedItem['headName'] != null ? selectedItem['headName'] : '—'}"></span>

      <span th:if="${selectedItem['headId'] != null}">
        (ID: <span th:text="${selectedItem['headId']}"></span>)
      </span>
    </div>
  </div>

  <div class="row g-3">

    <!-- ALL AFFILIATED -->
    <div class="col-md-6">
      <div class="card p-3">

        <div class="section-title mb-2">All Affiliated Physicians</div>

        <div th:each="a : ${affiliatedList}" class="mb-3 border-bottom pb-2">

          <b>Name:</b>
          <a th:href="@{/physician/relations(id=${a['physicianId']})}"
             th:text="${a['physicianName']}"
             class="text-decoration-none">
          </a><br>

          <b>ID:</b>
          <span th:text="${a['physicianId']}"></span><br>

          <b>Position:</b>
          <span th:text="${a['position']}"></span><br>

          <b>Type:</b>
          <span th:text="${a['primaryAffiliation'] == true or a['primaryAffiliation'] == 1 or a['primaryAffiliation'] == '0x01' ? 'Primary' : 'Secondary'}"></span>

        </div>

        <div th:if="${#lists.isEmpty(affiliatedList)}" class="text-muted">
          No affiliated physicians
        </div>

      </div>
    </div>

    <!-- PRIMARY ONLY -->
    <div class="col-md-6">
      <div class="card p-3">

        <div class="section-title mb-2">Primary Affiliations</div>

        <!-- ✅ FIX: USE primaryList -->
        <div th:each="a : ${primaryList}" class="mb-3 border-bottom pb-2">

          <b>Name:</b>
          <a th:href="@{/physician/relations(id=${a['physicianId']})}"
             th:text="${a['physicianName']}"
             class="text-decoration-none">
          </a><br>

          <b>ID:</b>
          <span th:text="${a['physicianId']}"></span><br>

          <b>Position:</b>
          <span th:text="${a['position']}"></span>

        </div>

        <!-- ✅ FIX: check primaryList -->
        <div th:if="${#lists.isEmpty(primaryList)}" class="text-muted">
          No primary affiliations
        </div>

      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
