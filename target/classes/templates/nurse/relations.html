<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Nurse Relations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#2e1065,#4c1d95);color:white;padding:24px 32px}
.rel-card{border-radius:12px;overflow:hidden;border:1px solid #e2e8f0}
.rel-header{padding:12px 16px;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between}
.rel-body{padding:14px 16px;max-height:320px;overflow-y:auto}
.item-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
.item-row:last-child{border-bottom:none}
.item-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
</nav>

<div class="page-header">
  <small class="opacity-50">Home / Nurse / Relations</small>
  <h4 class="mb-0 mt-1">Nurse Relations</h4>
</div>

<div class="container-fluid px-4 py-3">

  <!-- SELECT -->
  <div class="card p-3 mb-3">
    <form method="get">
      <label>Select Nurse</label>
      <select name="id" class="form-select w-auto" onchange="this.form.submit()">
        <option th:each="p : ${allItems}"
                th:value="${p['employeeId']}"
                th:text="${p['employeeId']} + ' — ' + ${p['name']}"
                th:selected="${p['employeeId']} == ${selectedId}">
        </option>
      </select>
    </form>
  </div>

  <!-- DETAILS -->
  <div class="card p-3 mb-3" th:if="${selectedItem != null}">
    <h5 th:text="${selectedItem['name']}"></h5>

    <div>
      <b>ID:</b> <span th:text="${selectedItem['employeeId']}"></span><br>
      <b>SSN:</b> <span th:text="${selectedItem['ssn']}"></span><br>
      <b>Position:</b> <span th:text="${selectedItem['position']}"></span><br>
      <b>Registered:</b>
      <span th:text="${selectedItem['registered'] ? 'Yes' : 'No'}"></span>
    </div>
  </div>

  <div class="row g-3">

    <!-- ON CALL -->
    <div class="col-md-4">
      <div class="rel-card bg-white">
        <div class="rel-header">
          <span>On-Call</span>
          <span th:text="${#lists.size(onCallList)}"></span>
        </div>

        <div class="rel-body">
          <div th:each="oc : ${onCallList}" class="item-row">
            <div class="item-av bg-primary">OC</div>
            <div>
              Floor: <span th:text="${oc['blockFloor']}"></span><br>
              Code: <span th:text="${oc['blockCode']}"></span><br>
              Start: <span th:text="${oc['onCallStart']}"></span><br>
              End: <span th:text="${oc['onCallEnd']}"></span>
            </div>
          </div>

          <div th:if="${#lists.isEmpty(onCallList)}">No data</div>
        </div>
      </div>
    </div>

    <!-- UNDERGOES -->
    <div class="col-md-4">
      <div class="rel-card bg-white">
        <div class="rel-header">
          <span>Undergoes</span>
          <span th:text="${#lists.size(undergoesList)}"></span>
        </div>

        <div class="rel-body">
          <div th:each="u : ${undergoesList}" class="item-row">
            <div class="item-av bg-success">UG</div>
            <div>
              Procedure: <span th:text="${u['procedures']}"></span><br>
              Patient: <span th:text="${u['patientName']}"></span><br>
              Physician: <span th:text="${u['physicianName']}"></span><br>
              Date: <span th:text="${u['dateUndergoes']}"></span>
            </div>
          </div>

          <div th:if="${#lists.isEmpty(undergoesList)}">No data</div>
        </div>
      </div>
    </div>

    <!-- APPOINTMENTS -->
    <div class="col-md-4">
      <div class="rel-card bg-white">
        <div class="rel-header">
          <span>Appointments</span>
          <span th:text="${#lists.size(apptList)}"></span>
        </div>

        <div class="rel-body">
          <div th:each="a : ${apptList}" class="item-row">
            <div class="item-av bg-warning">AP</div>
            <div>
              ID: <span th:text="${a['appointmentId']}"></span><br>
              Patient: <span th:text="${a['patientName']}"></span><br>
              Physician: <span th:text="${a['physicianName']}"></span><br>
              Start: <span th:text="${a['starto']}"></span><br>
              Room: <span th:text="${a['examinationRoom']}"></span>
            </div>
          </div>

          <div th:if="${#lists.isEmpty(apptList)}">No data</div>
        </div>
      </div>
    </div>

  </div>

</div>

<footer>HMS — Nurse Relations</footer>

</body>
</html>
