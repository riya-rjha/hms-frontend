<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Appointment Relations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#1e3a5f,#1e3a8f);color:white;padding:24px 32px}
.rel-card{border-radius:12px;overflow:hidden;border:1px solid #e2e8f0}
.rel-header{padding:12px 16px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.rel-body{padding:14px 16px;max-height:400px;overflow-y:auto}
.item-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
.item-row:last-child{border-bottom:none}
.item-av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0;margin-top:2px}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/appointment/list">Appointment List</a>
    <a class="btn btn-outline-light btn-sm active" href="/appointment/relations">Relations</a>
  </div>
</nav>

<div class="page-header">
  <small class="opacity-50">Home / Appointment / Relations</small>
  <h4 class="mb-0 mt-1">Appointment Relations</h4>
  <small class="opacity-60">Prescriptions linked to this Appointment</small>
</div>

<div class="container-fluid px-4 py-3">

  <div th:if="${error}" class="alert alert-danger"
       th:text="'Backend Error: ' + ${error}"></div>

  <!-- SELECTOR -->
  <div class="card p-3 mb-3">
    <form method="get" class="d-flex gap-2 align-items-center flex-wrap">
      <label class="fw-semibold">Select Appointment:</label>

      <select name="id" class="form-select form-select-sm w-auto"
              onchange="this.form.submit()">

        <option value="">-- Choose --</option>

        <option th:each="a : ${allItems}"
                th:value="${a['appointmentId']}"
                th:text="'#' + ${a['appointmentId']} + ' — ' + ${a['patientName']} + ' / ' + ${a['physicianName']}"
                th:selected="${a['appointmentId']} == ${selectedId}">
        </option>

      </select>

      <button class="btn btn-sm" style="background:#1d4ed8;color:white">Load</button>
    </form>
  </div>

  <!-- APPOINTMENT DETAILS -->
  <div class="alert d-flex align-items-center gap-3 mb-3"
       style="background:linear-gradient(135deg,#1e3a5f,#1e3a8f);color:white;border:none;border-radius:12px"
       th:if="${selectedItem != null}">

    <div style="width:48px;height:48px;border-radius:50%;background:rgba(59,130,246,.4);display:flex;align-items:center;justify-content:center;font-size:20px">📅</div>

    <div>
      <div class="fw-bold fs-5">
        Appointment #<span th:text="${selectedItem['appointmentId']}"></span>
      </div>

      <div style="font-size:13px">
        Room: <strong th:text="${selectedItem['examinationRoom']}"></strong> |
        Start: <span th:text="${selectedItem['starto']}"></span>
      </div>

      <div style="font-size:12px">
        End: <span th:text="${selectedItem['endo']}"></span>
      </div>
    </div>

  </div>

  <!-- PRESCRIPTIONS -->
  <div class="rel-card bg-white">

    <div class="rel-header" style="background:#f0fdf4">
      <span class="fw-semibold" style="color:#15803d">💊 Prescriptions</span>
      <span class="badge" style="background:#dcfce7;color:#15803d">
        <span th:text="${#lists.size(prescList)}"></span> items
      </span>
    </div>

    <div class="rel-body">

      <div th:each="rx : ${prescList}" class="item-row">

        <div class="item-av" style="background:#10b981">Rx</div>

        <div>

          <div>
            <b>Medication:</b>
            <span th:text="${rx['medicationName']} ?: ${rx['medication']}"></span>
          </div>

          <div>
            <b>Dose:</b>
            <span th:text="${rx['dose']}"></span>
          </div>

          <div>
            <b>Date:</b>
            <span th:text="${rx['date']}"></span>
          </div>

          <div>
            <b>Physician:</b>
            <a th:href="@{/physician/relations(id=${rx['physicianId']})}"
               th:text="${rx['physicianName']}"></a>
          </div>

          <div>
            <b>Patient:</b>
            <a th:href="@{/patient/relations(id=${rx['patientSsn']})}"
               th:text="${rx['patientName']}"></a>
          </div>

        </div>

      </div>

      <div th:if="${#lists.isEmpty(prescList)}"
           class="text-center text-muted py-4">
        No prescriptions found
      </div>

    </div>

  </div>

</div>

<footer>HMS — Appointment Relations</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
