<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>HMS — Procedure Relations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#0a1628,#1565c0);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
.section-title{font-size:14px;font-weight:600;color:#475569;text-transform:uppercase}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
</nav>

<!-- HEADER -->
<div class="page-header">
  <small class="opacity-50">Home / Procedure / Relations</small>
  <h4 class="mb-0 mt-1">Procedure Relations</h4>
</div>

<div class="container-fluid px-4 py-4">

  <!-- SELECT -->
  <div class="card p-3 mb-3">
    <form method="get">
      <label class="form-label">Select Procedure</label>
      <select name="id" class="form-select w-auto" onchange="this.form.submit()">

        <option th:each="p : ${allItems}"
                th:value="${p['code']}"
                th:text="${p['code']} + ' — ' + ${p['name']}"
                th:selected="${p['code']} == ${selectedId}">
        </option>

      </select>
    </form>
  </div>

  <!-- DETAILS -->
  <div class="card p-3 mb-3" th:if="${selectedItem != null}">
    <h5 th:text="${selectedItem['name']}"></h5>

    <div class="mt-2">
      <b>Code:</b> <span th:text="${selectedItem['code']}"></span><br>
      <b>Cost:</b> <span th:text="${selectedItem['cost']}"></span>
    </div>
  </div>

  <div class="row g-3">

    <!-- TRAINED PHYSICIANS -->
    <div class="col-md-6">
      <div class="card p-3">
        <div class="section-title mb-2">Trained Physicians</div>

        <div th:each="t : ${trainedList}" class="mb-3 border-bottom pb-2">

          <b>Physician ID:</b>
          <span th:text="${t['physicianId']}"></span><br>

          <b>Treatment Code:</b>
          <span th:text="${t['treatmentCode']}"></span><br>

          <b>Certification Date:</b>
          <span th:text="${t['certificationDate']}"></span><br>

          <b>Expires:</b>
          <span th:text="${t['certificationExpires']}"></span>

        </div>

        <div th:if="${#lists.isEmpty(trainedList)}" class="text-muted">
          No trained physicians found
        </div>
      </div>
    </div>

    <!-- UNDERGOES -->
    <div class="col-md-6">
      <div class="card p-3">
        <div class="section-title mb-2">Undergoes</div>

        <div th:each="u : ${undergoesList}" class="mb-3 border-bottom pb-2">

          <b>Patient:</b>
          <span th:text="${u['patientName']}"></span>
          (<span th:text="${u['patientId']}"></span>)<br>

          <b>Physician:</b>
          <span th:text="${u['physicianName']}"></span>
          (<span th:text="${u['physicianId']}"></span>)<br>

          <b>Date:</b>
          <span th:text="${u['dateUndergoes']}"></span><br>

          <b>Stay ID:</b>
          <span th:text="${u['stay']}"></span>

        </div>

        <div th:if="${#lists.isEmpty(undergoesList)}" class="text-muted">
          No procedures performed
        </div>
      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
