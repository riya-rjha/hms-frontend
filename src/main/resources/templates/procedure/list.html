<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Procedure</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#0a1628,#1565c0);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/physician/list">Physician</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/patient/list">Patient</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/department/list">Department</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/nurse/list">Nurse</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/appointment/list">Appointment</a>
    <a class="btn btn-outline-light btn-sm me-1 active" href="/procedure/list">Procedure</a>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <small class="opacity-50">Home / Procedure</small>
  <h4 class="mb-0 mt-1">Procedure Module</h4>
</div>

<div class="container-fluid px-4 py-3">

  <!-- ERROR -->
  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="card p-3">

    <table class="table table-sm table-hover">

      <thead class="table-light">
        <tr>
          <th>Code</th>
          <th>Name</th>
          <th>Cost</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <!-- DATA -->
        <tr th:each="p : ${items}">

          <!-- CODE -->
          <td th:text="${p['code'] != null ? p['code'] : '—'}"></td>

          <!-- NAME -->
          <td>
            <a th:href="@{/procedure/relations(id=${p['code']})}"
               th:text="${p['name']}"></a>
          </td>

          <!-- COST -->
          <td th:text="${p['cost'] != null ? p['cost'] : '—'}"></td>

          <!-- ACTIONS -->
          <td>

            <!-- EDIT -->
<!--            <button class="btn btn-sm btn-warning me-1"-->
<!--              th:attr="data-code=${p['code']},-->
<!--                       data-name=${p['name']},-->
<!--                       data-cost=${p['cost']}"-->
<!--              onclick="handleEdit(this)">-->
<!--              ✏️ Edit-->
<!--            </button>-->

            <!-- DETAILS -->
            <a th:href="@{/procedure/relations(id=${p['code']})}"
               class="btn btn-sm btn-outline-info">
              Details
            </a>

          </td>

        </tr>

        <!-- EMPTY STATE -->
        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="4" class="text-center text-muted py-3">
            No procedures found
          </td>
        </tr>

      </tbody>
    </table>

  </div>

</div>

<footer>HMS — Procedure Module | Backend: localhost:8082</footer>

<script>
// SAFE HANDLER
function handleEdit(btn) {
  const code = btn.getAttribute("data-code");
  const name = btn.getAttribute("data-name");
  const cost = btn.getAttribute("data-cost");

  fillEditForm(code, name, cost);
}

// EXISTING FUNCTION
function fillEditForm(code, name, cost) {
  document.getElementById('f-code').value = code;
  document.getElementById('f-code').readOnly = true;
  document.getElementById('f-name').value = name;
  document.getElementById('f-cost').value = cost;
}
</script>

</body>
</html>
