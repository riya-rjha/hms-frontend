<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Patient</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#0a1628,#1565c0);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
</style>
</head>

<body>

<!-- NAVBAR (same as physician) -->
<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/physician/list">Physician</a>
    <a class="btn btn-outline-light btn-sm me-1 active" href="/patient/list">Patient</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/department/list">Department</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/nurse/list">Nurse</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/appointment/list">Appointment</a>
    <a class="btn btn-outline-light btn-sm" href="/procedure/list">Procedure</a>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <small class="opacity-50">Home / Patient</small>
  <h4 class="mb-0 mt-1">Patient Module</h4>
</div>

<div class="container-fluid px-4 py-3">

  <div th:if="${error}" class="alert alert-danger" th:text="'Backend Error: ' + ${error}"></div>

  <div class="card p-3">
    <table class="table table-sm table-hover">

      <thead class="table-light">
        <tr>
          <th>SSN</th>
          <th>Name</th>
          <th>Phone</th>
          <th>Address</th>
          <th>Insurance</th>
          <th>PCP</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr th:each="p : ${items}">

          <td th:text="${p['ssn']}"></td>

          <td>
            <a th:href="@{/patient/relations(id=${p['ssn']})}"
               th:text="${p['name']}"></a>
          </td>

          <td th:text="${p['phone']}"></td>

          <td th:text="${p['address']}"></td>

          <td th:text="${p['insuranceId']}"></td>

          <td>
            <span th:text="${p['pcpName']}"></span>
            <br>
            <small class="text-muted">(ID: <span th:text="${p['pcpId']}"></span>)</small>
          </td>

          <td>

            <!-- EDIT BUTTON -->
            <button class="btn btn-sm btn-warning me-1"
              th:attr="data-ssn=${p['ssn']},
                       data-name=${p['name']},
                       data-address=${p['address']},
                       data-phone=${p['phone']},
                       data-insurance=${p['insuranceId']},
                       data-pcp=${p['pcpId']}"
              onclick="handleEdit(this)">
              ✏️ Edit
            </button>

            <!-- DETAILS BUTTON -->
            <a th:href="@{/patient/relations(id=${p['ssn']})}"
               class="btn btn-sm btn-outline-info">
              Details
            </a>

          </td>

        </tr>

        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="7" class="text-center text-muted py-3">
            No patients found
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>

<footer>HMS — Patient Module | Backend: localhost:8082</footer>

<script>
function handleEdit(btn) {
  const ssn = btn.getAttribute("data-ssn");
  const name = btn.getAttribute("data-name");
  const address = btn.getAttribute("data-address");
  const phone = btn.getAttribute("data-phone");
  const insurance = btn.getAttribute("data-insurance");
  const pcp = btn.getAttribute("data-pcp");

  fillEditForm(ssn, name, address, phone, insurance, pcp);
}
</script>

</body>
</html>
