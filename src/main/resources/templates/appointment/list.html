<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Appointment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#0a1628,#1565c0);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/physician/list">Physician</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/patient/list">Patient</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/department/list">Department</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/nurse/list">Nurse</a>
    <a class="btn btn-outline-light btn-sm me-1 active" href="/appointment/list">Appointment</a>
    <a class="btn btn-outline-light btn-sm" href="/procedure/list">Procedure</a>
  </div>
</nav>

<div class="page-header">
  <small class="opacity-50">Home / Appointment</small>
  <h4 class="mb-0 mt-1">Appointment Module</h4>
</div>

<div class="container-fluid px-4 py-3">

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="card p-3">

    <table class="table table-sm table-hover">

      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Patient</th>
          <th>Physician</th>
<!--          <th>Nurse</th>-->
          <th>Start</th>
          <th>End</th>
          <th>Room</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr th:each="a : ${items}">

          <td th:text="${a['appointmentId']}"></td>

          <td th:text="${a['patientName']}"></td>

          <td th:text="${a['physicianName']}"></td>

<!--          <td th:text="${a['prepNurseName']}"></td>-->

          <td th:text="${a['starto']}"></td>

          <td th:text="${a['endo']}"></td>

          <td th:text="${a['examinationRoom']}"></td>

          <td>
            <a th:href="@{/appointment/relations(id=${a['appointmentId']})}"
               class="btn btn-sm btn-outline-info">
              Details
            </a>
          </td>

        </tr>

        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="8" class="text-center text-muted py-3">
            No appointments found
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>

<footer>HMS — Appointment Module</footer>

</body>
</html>
