<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Appointment Module</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#1e3a5f,#1e3a8f);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
.filter-active{border:2px solid #3b82f6 !important;background:#eff6ff !important}
</style>
</head>

<body>

<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
</nav>

<div class="page-header">
  <small>Home / Appointment</small>
  <h4>Appointment Module</h4>
</div>

<div class="container mt-4">

<table class="table table-sm table-hover">

<tr th:each="a : ${items}">

<td th:text="${a['appointmentId']}"></td>

<td>
<a th:href="@{/patient/relations(id=${a['patientSsn']})}"
   th:text="${a['patientName']}"></a>
</td>

<td>
<a th:href="@{/physician/relations(id=${a['physicianId']})}"
   th:text="${a['physicianName']}"></a>
</td>

<td>
<span th:text="${a['prepNurseName']} ?: '—'"></span>
</td>

<td th:text="${a['starto']}"></td>
<td th:text="${a['endo']}"></td>

<td th:text="${a['examinationRoom']}"></td>

<td>
<a th:href="@{/appointment/relations(id=${a['appointmentId']})}">
Details
</a>
</td>

</tr>

</table>

</div>

</body>
</html>
