<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Appointment Relations</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#0a1628,#1565c0);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
.section-title{font-size:14px;font-weight:600;color:#475569;text-transform:uppercase}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/appointment/list">Appointment</a>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <small class="opacity-50">Home / Appointment / Relations</small>
  <h4 class="mb-0 mt-1">Appointment Relations</h4>
</div>

<div class="container-fluid px-4 py-4">

  <!-- SELECT -->
  <div class="card p-3 mb-3">
    <form method="get">
      <label class="form-label">Select Appointment</label>

      <select name="id" class="form-select w-auto" onchange="this.form.submit()">
        <option th:each="a : ${allItems}"
                th:value="${a['appointmentId']}"
                th:text="'#' + ${a['appointmentId']} + ' — ' + ${a['patientName']} + ' / ' + ${a['physicianName']}"
                th:selected="${a['appointmentId']} == ${selectedId}">
        </option>
      </select>
    </form>
  </div>

  <!-- DETAILS -->
  <div class="card p-3 mb-3" th:if="${selectedItem != null}">
    <h5>
      Appointment #
      <span th:text="${selectedItem['appointmentId']}"></span>
    </h5>

    <div class="mt-2">
      <b>Room:</b>
      <span th:text="${selectedItem['examinationRoom']}"></span><br>

      <b>Start:</b>
      <span th:text="${selectedItem['starto']}"></span><br>

      <b>End:</b>
      <span th:text="${selectedItem['endo']}"></span>
    </div>
  </div>

  <div class="row g-3">

    <!-- PRESCRIPTIONS -->
    <div class="col-md-6">
      <div class="card p-3">

        <div class="section-title mb-2">Prescriptions</div>

        <div th:each="rx : ${prescList}" class="mb-3 border-bottom pb-2">

          <b>Medication:</b>
          <span th:text="${rx['medicationName']} ?: ${rx['medication']}"></span><br>

          <b>Dose:</b>
          <span th:text="${rx['dose']}"></span><br>

          <b>Date:</b>
          <span th:text="${rx['date']}"></span><br>

          <b>Physician:</b>
          <a th:href="@{/physician/relations(id=${rx['physicianId']})}"
             th:text="${rx['physicianName']}"></a><br>

          <b>Patient:</b>
          <a th:href="@{/patient/relations(id=${rx['patientSsn']})}"
             th:text="${rx['patientName']}"></a>

        </div>

        <div th:if="${#lists.isEmpty(prescList)}" class="text-muted">
          No prescriptions found
        </div>

      </div>
    </div>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
