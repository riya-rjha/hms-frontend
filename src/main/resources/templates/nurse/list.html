.page-header{background:linear-gradient(135deg,#2e1065,#4c1d95);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}

<body>

    <a class="btn btn-outline-light btn-sm me-1 active" href="/nurse/list">Nurse</a>

<div class="page-header">
  <small class="opacity-50">Home / Nurse</small>
  <h4 class="mb-0 mt-1">Nurse Module</h4>

<div class="container-fluid px-4 py-3">

  <div th:if="${error}" class="alert alert-danger" th:text="'Backend Error: ' + ${error}"></div>

  <!-- SEARCH -->
<!--  <div class="card p-3 mb-3">-->

  <!-- TABLE -->
  <div class="card p-3">
    <table class="table table-sm table-hover">

      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Position</th>
          <th>Registered</th>
          <th>SSN</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr th:each="p : ${items}">

          <td th:text="${p['employeeId']}"></td>

          <td>
            <a th:href="@{/nurse/relations(id=${p['employeeId']})}"
               th:text="${p['name']}"></a>
          </td>

          <td th:text="${p['position']}"></td>

          <td>
            <span th:text="${p['registered'] ? 'Yes' : 'No'}"></span>
          </td>

          <td th:text="${p['ssn']}"></td>

          <td>

<!--                       data-ssn=${p['ssn']}"-->
<!--              onclick="handleEdit(this)">-->
<!--              ✏️ Edit-->
<!--            </button>-->

            <a th:href="@{/nurse/relations(id=${p['employeeId']})}"
               class="btn btn-sm btn-outline-info">
              Details
            </a>

          </td>

        </tr>

        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="6" class="text-center text-muted">
            No records found
          </td>
        </tr>

      </tbody>
    </table>
  </div>

</div>

<footer>HMS — Nurse Module</footer>

<script>
function handleEdit(btn) {
  const id = btn.getAttribute("data-id");
  const name = btn.getAttribute("data-name");
  const pos = btn.getAttribute("data-pos");
  const reg = btn.getAttribute("data-reg");
  const ssn = btn.getAttribute("data-ssn");

  fillEditForm(id, name, pos, reg, ssn);
}

function fillEditForm(id, name, position, registered, ssn) {
  document.getElementById('f-id').value = id;
  document.getElementById('f-id').readOnly = true;
  document.getElementById('f-name').value = name;
  document.getElementById('f-pos').value = position;
  document.getElementById('f-registered').value = registered ? 'true' : 'false';
  document.getElementById('f-ssn').value = ssn;
}
</script>

</body>
