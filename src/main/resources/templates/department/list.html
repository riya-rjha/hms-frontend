<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>HMS — Department</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{background:#f8faff}
.page-header{background:linear-gradient(135deg,#0a1628,#1565c0);color:white;padding:24px 32px}
.card{border-radius:12px;border:1px solid #e2e8f0}
footer{background:#060e1c;color:rgba(255,255,255,.4);padding:12px;text-align:center;font-size:11px;margin-top:30px}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4" style="background:#0a1628">
  <span class="navbar-brand fw-bold">🏥 HMS Portal</span>
  <div>
    <a class="btn btn-outline-light btn-sm me-1" href="/">Home</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/physician/list">Physician</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/patient/list">Patient</a>
    <a class="btn btn-outline-light btn-sm me-1 active" href="/department/list">Department</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/nurse/list">Nurse</a>
    <a class="btn btn-outline-light btn-sm me-1" href="/appointment/list">Appointment</a>
    <a class="btn btn-outline-light btn-sm" href="/procedure/list">Procedure</a>
  </div>
</nav>

<!-- HEADER -->
<div class="page-header">
  <small class="opacity-50">Home / Department</small>
  <h4 class="mb-0 mt-1">Department Module</h4>
</div>

<div class="container-fluid px-4 py-3">

  <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

  <div class="card p-3">

    <table class="table table-sm table-hover">

      <thead class="table-light">
        <tr>
          <th>Department ID</th>
          <th>Name</th>
          <th>Head</th>
          <th>Actions</th>
        </tr>
      </thead>

      <tbody>

        <tr th:each="d : ${items}">

          <!-- ID -->
          <td th:text="${d['departmentId']}"></td>

          <!-- NAME -->
          <td>
            <a th:href="@{/department/relations(id=${d['departmentId']})}"
               th:text="${d['name']}">
            </a>
          </td>

          <!-- HEAD -->
          <td>
            <span th:text="${d['headName'] != null ? d['headName'] : '—'}"></span>
            <br>
            <small class="text-muted">
              (ID: <span th:text="${d['headId'] != null ? d['headId'] : '—'}"></span>)
            </small>
          </td>

          <!-- ACTION -->
          <td>
            <a th:href="@{/department/relations(id=${d['departmentId']})}"
               class="btn btn-sm btn-outline-info">
              Details
            </a>
          </td>

        </tr>

        <tr th:if="${#lists.isEmpty(items)}">
          <td colspan="4" class="text-center text-muted py-3">
            No departments found
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>

<footer>HMS — Department Module | Backend: localhost:8082</footer>

</body>
</html>
